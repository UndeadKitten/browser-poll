<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Bracket & Global Leaderboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --accent: #bb86fc;
            --accent-hover: #9c27b0;
            --border: #333;
            --success: #03dac6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 800px; text-align: center; }
        h1 { margin-bottom: 5px; }
        
        .status-bar { 
            color: var(--accent); font-weight: bold; font-size: 18px; 
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        .progress-bar { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }

        /* Matchup Arena */
        .matchup-container {
            display: flex; gap: 20px; margin-bottom: 40px; justify-content: center; align-items: stretch;
        }
        .browser-card {
            background-color: var(--surface-color); border: 2px solid var(--border);
            border-radius: 12px; padding: 40px 20px; flex: 1; text-align: center;
            cursor: pointer; transition: all 0.2s ease; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .browser-card:hover { border-color: var(--accent); background-color: #2a2a2a; transform: translateY(-2px); }
        .browser-name { font-size: 26px; font-weight: bold; }
        
        /* Logo Styles */
        .browser-logo {
            width: 96px;
            height: 96px;
            margin-top: 20px;
            object-fit: contain;
        }
        
        .vs-badge { display: flex; align-items: center; font-weight: bold; color: var(--text-muted); font-size: 20px; }

        /* Winner Screen & Leaderboard */
        .winner-screen {
            display: none; background-color: var(--surface-color); border: 2px solid var(--success);
            border-radius: 12px; padding: 40px; margin-top: 20px;
        }
        .winner-title { font-size: 32px; color: var(--success); font-weight: bold; margin-bottom: 10px; }
        
        .leaderboard-container {
            margin-top: 40px; background-color: var(--surface-color);
            border-radius: 12px; padding: 20px; border: 1px solid var(--border); text-align: left;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px;}
        th, td { padding: 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        tr:last-child td { border-bottom: none; }
        .rank { font-weight: bold; color: var(--accent); width: 40px;}
        .elo-score { font-family: monospace; font-size: 16px; color: var(--success); }

        .btn {
            background-color: var(--accent); color: #000; border: none; padding: 12px 30px;
            font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;
            margin-top: 20px; transition: background-color 0.2s;
        }
        .btn:hover { background-color: var(--accent-hover); color: #fff; }

        /* Elimination Log / Feed */
        .log-container {
            margin-top: 40px; text-align: left; background-color: #171717;
            padding: 20px; border-radius: 8px; border: 1px solid var(--border);
            max-height: 180px; overflow-y: auto; width: 100%; box-sizing: border-box;
        }
        .log-title {
            font-size: 12px; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px;
        }
        .log-entry { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; font-family: monospace; }

    </style>
</head>
<body>

    <div class="container">
        
        <div id="tournament-view">
            <h1>Browser Bracket</h1>
            <div class="status-bar" id="round-title">Round 1</div>
            <div class="progress-bar" id="match-progress">Match 1 of 12</div>

            <div class="matchup-container">
                <div class="browser-card" onclick="castVote(0)">
                    <div class="browser-name" id="nameA">Browser A</div>
                    <img class="browser-logo" id="logoA" src="" alt="Browser A Logo">
                </div>
                <div class="vs-badge">VS</div>
                <div class="browser-card" onclick="castVote(1)">
                    <div class="browser-name" id="nameB">Browser B</div>
                    <img class="browser-logo" id="logoB" src="" alt="Browser B Logo">
                </div>
            </div>
        </div>

        <div id="winner-view" style="display: none;">
            <div class="winner-screen">
                <div style="font-size: 50px;">🏆</div>
                <div class="winner-title">Your Ultimate Choice</div>
                <div id="winner-name" style="font-size: 32px; font-weight: bold; margin-bottom: 15px;">Mozilla Firefox</div>
                <img class="browser-logo" id="winner-logo" src="" alt="Winner Logo" style="width: 128px; height: 128px; margin-top: 0;">
                <br>
                <button class="btn" onclick="resetTournament()">Play Another Bracket</button>
            </div>

            <div class="leaderboard-container">
                <h2>Global Master Leaderboard (Elo Rating)</h2>
                <div style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">
                    Rankings are mathematically calculated behind the scenes based on all tournament matchups.
                </div>
                <table>
                    <thead>
                        <tr>
                            <th class="rank">#</th>
                            <th>Browser</th>
                            <th>Elo Rating</th>
                            <th>Total Matches</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="log-container">
            <div class="log-title">Tournament Feed</div>
            <div id="log-feed"></div>
        </div>

    </div>

    <script>
        // 1. Core Data (Includes clean 'id' tokens for file paths)
        // 1. Updated Core Data with website domains
let masterBrowsers = [
    { domain: "mozilla.org", name: "Mozilla Firefox", elo: 1200, matches: 0 },
    { domain: "librewolf.net", name: "Librewolf", elo: 1200, matches: 0 },
    { domain: "floorp.app", name: "Floorp", elo: 1200, matches: 0 },
    { domain: "waterfox.net", name: "Waterfox", elo: 1200, matches: 0 },
    { domain: "mullvad.net", name: "Mullvad Browser", elo: 1200, matches: 0 },
    { domain: "palemoon.org", name: "Pale Moon", elo: 1200, matches: 0 },
    { domain: "zen-browser.app", name: "Zen Browser", elo: 1200, matches: 0 },
    { domain: "torproject.org", name: "Tor Browser", elo: 1200, matches: 0 },
    { domain: "google.com/chrome", name: "Google Chrome", elo: 1200, matches: 0 },
    { domain: "chromium.org", name: "Ungoogled Chromium", elo: 1200, matches: 0 },
    { domain: "brave.com", name: "Brave", elo: 1200, matches: 0 },
    { domain: "vivaldi.com", name: "Vivaldi", elo: 1200, matches: 0 },
    { domain: "github.com/Alex313031/thorium", name: "Thorium", elo: 1200, matches: 0 },
    { domain: "microsoft.com/edge", name: "Microsoft Edge", elo: 1200, matches: 0 },
    { domain: "opera.com", name: "Opera", elo: 1200, matches: 0 },
    { domain: "opera.com/gx", name: "Opera GX", elo: 1200, matches: 0 },
    { domain: "arc.net", name: "Arc", elo: 1200, matches: 0 },
    { domain: "apple.com/safari", name: "Apple Safari", elo: 1200, matches: 0 },
    { domain: "duckduckgo.com", name: "DuckDuckGo Browser", elo: 1200, matches: 0 },
    { domain: "qutebrowser.org", name: "qutebrowser", elo: 1200, matches: 0 },
    { domain: "ladybird.org", name: "Ladybird", elo: 1200, matches: 0 },
    { domain: "astian.org/midori-browser", name: "Midori", elo: 1200, matches: 0 },
    { domain: "falkon.org", name: "Falkon", elo: 1200, matches: 0 },
    { domain: "browser.kagi.com", name: "Orion", elo: 1200, matches: 0 }
];

// ... (Keep your existing state variables, Elo math, and shuffle functions) ...

// 4. Update the UI rendering function to pull from Google's Favicon API
function updateUI() {
    document.getElementById('round-title').innerText = "Round " + roundNumber;
    document.getElementById('match-progress').innerText = "Match " + (currentMatchIndex + 1) + " of " + currentMatchups.length;

    let currentPair = currentMatchups[currentMatchIndex];
    
    // Set Names
    document.getElementById('nameA').innerText = currentPair[0].name;
    document.getElementById('nameB').innerText = currentPair[1].name;

    // Dynamically grab the highest quality favicon from Google's service
    document.getElementById('logoA').src = "https://www.google.com/s2/favicons?sz=128&domain=" + currentPair[0].domain;
    document.getElementById('logoB').src = "https://www.google.com/s2/favicons?sz=128&domain=" + currentPair[1].domain;
}

// 5. Update the Winner screen image source logic too
function showWinnerAndLeaderboard(winnerObj) {
    document.getElementById('tournament-view').style.display = 'none';
    document.getElementById('winner-view').style.display = 'block';
    
    document.getElementById('winner-name').innerText = winnerObj.name;
    document.getElementById('winner-logo').src = "https://www.google.com/s2/favicons?sz=128&domain=" + winnerObj.domain;
    
    logEvent("🏆 TOURNAMENT CHAMPION: " + winnerObj.name);

    renderLeaderboard();
}

        // Tournament State Variables
        let activePool = [];
        let nextRoundPool = [];
        let currentMatchups = [];
        let currentMatchIndex = 0;
        let roundNumber = 1;

        // 2. The Elo Math Logic
        const K_FACTOR = 32;

        function updateRatings(winnerObj, loserObj) {
            let expectedWinner = 1 / (1 + Math.pow(10, (loserObj.elo - winnerObj.elo) / 400));
            let expectedLoser = 1 / (1 + Math.pow(10, (winnerObj.elo - loserObj.elo) / 400));

            winnerObj.elo = winnerObj.elo + K_FACTOR * (1 - expectedWinner);
            loserObj.elo = loserObj.elo + K_FACTOR * (0 - expectedLoser);

            winnerObj.matches++;
            loserObj.matches++;
        }

        // 3. Logger Function
        function logEvent(text) {
            const feed = document.getElementById('log-feed');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = text;
            feed.insertBefore(entry, feed.firstChild);
        }

        // 4. Tournament Logic
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initTournament() {
            document.getElementById('log-feed').innerHTML = '';
            document.getElementById('tournament-view').style.display = 'block';
            document.getElementById('winner-view').style.display = 'none';
            
            activePool = [...masterBrowsers];
            roundNumber = 1;
            logEvent("⚔️ Tournament started with " + activePool.length + " browsers.");
            generateRoundMatchups();
        }

        function generateRoundMatchups() {
            currentMatchups = [];
            currentMatchIndex = 0;
            nextRoundPool = [];

            shuffleArray(activePool);

            if (activePool.length % 2 !== 0) {
                let byeBrowser = activePool.pop();
                nextRoundPool.push(byeBrowser);
                logEvent("🎲 " + byeBrowser.name + " received a round bye and automatically advances.");
            }

            for (let i = 0; i < activePool.length; i += 2) {
                currentMatchups.push([activePool[i], activePool[i+1]]);
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('round-title').innerText = "Round " + roundNumber;
            document.getElementById('match-progress').innerText = "Match " + (currentMatchIndex + 1) + " of " + currentMatchups.length;

            let currentPair = currentMatchups[currentMatchIndex];
            
            // Set Names
            document.getElementById('nameA').innerText = currentPair[0].name;
            document.getElementById('nameB').innerText = currentPair[1].name;

            // Set Image Sources dynamically
            document.getElementById('logoA').src = "images/" + currentPair[0].id + ".webp";
            document.getElementById('logoB').src = "images/" + currentPair[1].id + ".webp";
        }

        function castVote(selectedIndex) {
            let currentPair = currentMatchups[currentMatchIndex];
            let winner = currentPair[selectedIndex];
            let loser = currentPair[selectedIndex === 0 ? 1 : 0];

            // Secret Elo adjustment
            updateRatings(winner, loser);
            logEvent("❌ " + loser.name + " eliminated by " + winner.name);

            nextRoundPool.push(winner);
            currentMatchIndex++;

            if (currentMatchIndex < currentMatchups.length) {
                updateUI();
            } else {
                activePool = [...nextRoundPool];
                if (activePool.length === 1) {
                    showWinnerAndLeaderboard(activePool[0]);
                } else {
                    roundNumber++;
                    logEvent("🚀 Moving into Round " + roundNumber + " with " + activePool.length + " contenders.");
                    generateRoundMatchups();
                }
            }
        }

        // 5. Finale Logic
        function showWinnerAndLeaderboard(winnerObj) {
            document.getElementById('tournament-view').style.display = 'none';
            document.getElementById('winner-view').style.display = 'block';
            
            document.getElementById('winner-name').innerText = winnerObj.name;
            document.getElementById('winner-logo').src = "images/" + winnerObj.id + ".webp";
            
            logEvent("🏆 TOURNAMENT CHAMPION: " + winnerObj.name);

            renderLeaderboard();
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            let sortedBrowsers = [...masterBrowsers].sort((a, b) => b.elo - a.elo);

            sortedBrowsers.forEach((b, index) => {
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="rank">${index + 1}</td>
                    <td>${b.name}</td>
                    <td class="elo-score">${Math.round(b.elo)}</td>
                    <td>${b.matches}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function resetTournament() {
            initTournament();
        }

        // Boot system up
        initTournament();
    </script>
</body>
</html>
