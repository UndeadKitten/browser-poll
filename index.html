<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Showdown: Pairwise Ranking</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --accent: #bb86fc;
            --accent-hover: #9c27b0;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 5px; }
        .subtitle { color: var(--text-muted); margin-bottom: 40px; }

        /* Matchup Area */
        .matchup-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            align-items: stretch;
        }

        .browser-card {
            background-color: var(--surface-color);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            flex: 1;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .browser-card:hover {
            border-color: var(--accent);
            background-color: #2a2a2a;
            transform: translateY(-2px);
        }

        .browser-name {
            font-size: 24px;
            font-weight: bold;
        }

        .vs-badge {
            display: flex;
            align-items: center;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 20px;
        }

        /* Leaderboard Area */
        .leaderboard {
            width: 100%;
            max-width: 600px;
            background-color: var(--surface-color);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        tr:last-child td { border-bottom: none; }
        .rank { font-weight: bold; color: var(--accent); width: 40px;}
        .elo-score { font-family: monospace; font-size: 16px; }
    </style>
</head>
<body>

    <h1>Which Browser is Better?</h1>
    <div class="subtitle">Click your preferred browser to vote.</div>

    <div class="matchup-container">
        <div class="browser-card" id="cardA" onclick="handleVote('A')">
            <div class="browser-name" id="nameA">Browser A</div>
        </div>
        
        <div class="vs-badge">VS</div>

        <div class="browser-card" id="cardB" onclick="handleVote('B')">
            <div class="browser-name" id="nameB">Browser B</div>
        </div>
    </div>

    <div class="leaderboard">
        <h2>Live Leaderboard (Local Test)</h2>
        <table>
            <thead>
                <tr>
                    <th class="rank">#</th>
                    <th>Browser</th>
                    <th>Elo Rating</th>
                    <th>Matches</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>
    </div>

    <script>
        // 1. Initial Data (In Phase 2, this will be fetched from a database)
        let browsers = [
            { id: "firefox", name: "Mozilla Firefox", elo: 1200, matches: 0 },
            { id: "librewolf", name: "Librewolf", elo: 1200, matches: 0 },
            { id: "floorp", name: "Floorp", elo: 1200, matches: 0 },
            { id: "waterfox", name: "Waterfox", elo: 1200, matches: 0 },
            { id: "mullvad", name: "Mullvad Browser", elo: 1200, matches: 0 },
            { id: "palemoon", name: "Pale Moon", elo: 1200, matches: 0 },
            { id: "chrome", name: "Google Chrome", elo: 1200, matches: 0 },
            { id: "chromium", name: "Ungoogled Chromium", elo: 1200, matches: 0 },
            { id: "brave", name: "Brave", elo: 1200, matches: 0 },
            { id: "vivaldi", name: "Vivaldi", elo: 1200, matches: 0 },
            { id: "thorium", name: "Thorium", elo: 1200, matches: 0 },
            { id: "edge", name: "Microsoft Edge", elo: 1200, matches: 0 },
            { id: "opera", name: "Opera", elo: 1200, matches: 0 },
            { id: "operagx", name: "Opera GX", elo: 1200, matches: 0 },
            { id: "arc", name: "Arc", elo: 1200, matches: 0 },
            { id: "zen", name: "Zen Browser", elo: 1200, matches: 0 },
            { id: "safari", name: "Apple Safari", elo: 1200, matches: 0 },
            { id: "duckduckgo", name: "DuckDuckGo Browser", elo: 1200, matches: 0 },
            { id: "tor", name: "Tor Browser", elo: 1200, matches: 0 },
            { id: "qutebrowser", name: "qutebrowser", elo: 1200, matches: 0 }
        ];

        let currentPair = [];

        // 2. The Elo Math Logic
        const K_FACTOR = 32; // How much ratings change per vote. Higher = more volatile.

        function calculateExpectedScore(ratingA, ratingB) {
            return 1 / (1 + Math.pow(10, (ratingB - ratingA) / 400));
        }

        function updateRatings(winnerIdx, loserIdx) {
            let winner = browsers[winnerIdx];
            let loser = browsers[loserIdx];

            let expectedWinner = calculateExpectedScore(winner.elo, loser.elo);
            let expectedLoser = calculateExpectedScore(loser.elo, winner.elo);

            // Winner gets a score of 1, Loser gets 0
            winner.elo = winner.elo + K_FACTOR * (1 - expectedWinner);
            loser.elo = loser.elo + K_FACTOR * (0 - expectedLoser);

            winner.matches++;
            loser.matches++;
        }

        // 3. UI Logic
        function loadNewMatchup() {
            // 1. Pick the first browser completely at random
            let idxA = Math.floor(Math.random() * browsers.length);
            let browserA = browsers[idxA];
        
            // 2. Map all other browsers and calculate how close their Elo is to Browser A
            let candidates = [];
            for (let i = 0; i < browsers.length; i++) {
                if (i !== idxA) {
                    candidates.push({
                        idx: i,
                        eloDifference: Math.abs(browsers[i].elo - browserA.elo)
                    });
                }
            }
        
            // 3. Sort candidates so the closest matching Elo ratings are at the front
            candidates.sort((a, b) => a.eloDifference - b.eloDifference);
        
            // 4. Take a small pool of the closest competitors (e.g., the top 4 closest)
            // and pick one at random so the user doesn't get the exact same loop.
            let poolSize = Math.min(4, candidates.length);
            let randomPoolIdx = Math.floor(Math.random() * poolSize);
            let idxB = candidates[randomPoolIdx].idx;
        
            // Set the pair and update the UI
            currentPair = [idxA, idxB];
            document.getElementById('nameA').innerText = browsers[idxA].name;
            document.getElementById('nameB').innerText = browsers[idxB].name;
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            // Sort a copy of the array by Elo descending
            let sortedBrowsers = [...browsers].sort((a, b) => b.elo - a.elo);

            sortedBrowsers.forEach((b, index) => {
                let tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td class="rank">${index + 1}</td>
                    <td>${b.name}</td>
                    <td class="elo-score">${Math.round(b.elo)}</td>
                    <td>${b.matches}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Initialize the app
        renderLeaderboard();
        loadNewMatchup();

    </script>
</body>
</html>
