<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Bracket: Elimination Tournament</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --accent: #bb86fc;
            --accent-hover: #9c27b0;
            --border: #333;
            --success: #03dac6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        h1 { margin-bottom: 5px; }
        .status-bar { 
            color: var(--accent); 
            font-weight: bold; 
            font-size: 18px; 
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .progress-bar {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Matchup Arena */
        .matchup-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
            align-items: stretch;
        }

        .browser-card {
            background-color: var(--surface-color);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 50px 20px;
            flex: 1;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .browser-card:hover {
            border-color: var(--accent);
            background-color: #2a2a2a;
            transform: translateY(-2px);
        }

        .browser-name {
            font-size: 26px;
            font-weight: bold;
        }

        .vs-badge {
            display: flex;
            align-items: center;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 20px;
        }

        /* Winner Screen */
        .winner-screen {
            display: none;
            background-color: var(--surface-color);
            border: 2px solid var(--success);
            border-radius: 12px;
            padding: 60px 40px;
            margin-top: 40px;
        }

        .winner-title {
            font-size: 40px;
            color: var(--success);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .restart-btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 30px;
            transition: background-color 0.2s;
        }

        .restart-btn:hover {
            background-color: var(--accent-hover);
            color: #fff;
        }

        /* Elimination Log / Feed */
        .log-container {
            margin-top: 40px;
            text-align: left;
            background-color: #171717;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            max-height: 200px;
            overflow-y: auto;
        }

        .log-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .log-entry {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="tournament-view">
            <h1>Browser Bracket</h1>
            <div class="status-bar" id="round-title">Round 1</div>
            <div class="progress-bar" id="match-progress">Match 1 of 12</div>

            <div class="matchup-container">
                <div class="browser-card" id="cardA" onclick="castVote(0)">
                    <div class="browser-name" id="nameA">Browser A</div>
                </div>
                
                <div class="vs-badge">VS</div>

                <div class="browser-card" id="cardB" onclick="castVote(1)">
                    <div class="browser-name" id="nameB">Browser B</div>
                </div>
            </div>
        </div>

        <div class="winner-screen" id="winner-view">
            <div style="font-size: 50px;">🏆</div>
            <div class="winner-title">The Absolute Best Browser</div>
            <div id="winner-name" style="font-size: 32px; font-weight: bold;">Mozilla Firefox</div>
            <button class="restart-btn" onclick="resetTournament()">Start New Bracket</button>
        </div>

        <div class="log-container">
            <div class="log-title">Tournament Feed</div>
            <div id="log-feed"></div>
        </div>
    </div>

    <script>
        // Comprehensive master list of browsers and forks (24 items total)
        const MASTER_BROWSERS = [
            "Mozilla Firefox", "Librewolf", "Floorp", "Waterfox", 
            "Mullvad Browser", "Pale Moon", "Zen Browser", "Tor Browser",
            "Google Chrome", "Ungoogled Chromium", "Brave", "Vivaldi", 
            "Thorium", "Microsoft Edge", "Opera", "Opera GX", 
            "Arc", "Apple Safari", "DuckDuckGo Browser", "qutebrowser",
            "Ladybird", "Midori", "Falkon", "Orion"
        ];

        let activePool = [];
        let nextRoundPool = [];
        let currentMatchups = [];
        let currentMatchIndex = 0;
        let roundNumber = 1;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function logEvent(text) {
            const feed = document.getElementById('log-feed');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = text;
            feed.insertBefore(entry, feed.firstChild);
        }

        function initTournament() {
            document.getElementById('log-feed').innerHTML = '';
            document.getElementById('tournament-view').style.display = 'block';
            document.getElementById('winner-view').style.display = 'none';
            
            activePool = [...MASTER_BROWSERS];
            roundNumber = 1;
            logEvent("Tournament started with " + activePool.length + " browsers.");
            generateRoundMatchups();
        }

        function generateRoundMatchups() {
            currentMatchups = [];
            currentMatchIndex = 0;
            nextRoundPool = [];

            shuffleArray(activePool);

            // Handle odd number of items with a random Bye
            if (activePool.length % 2 !== 0) {
                let byeBrowser = activePool.pop();
                nextRoundPool.push(byeBrowser);
                logEvent("🎲 " + byeBrowser + " received a round bye and automatically advances.");
            }

            // Pair up remaining items
            for (let i = 0; i < activePool.length; i += 2) {
                currentMatchups.push([activePool[i], activePool[i+1]]);
            }

            updateUI();
        }

        function updateUI() {
            // Update Headers
            document.getElementById('round-title').innerText = "Round " + roundNumber;
            document.getElementById('match-progress').innerText = "Match " + (currentMatchIndex + 1) + " of " + currentMatchups.length;

            // Update Matchup Cards
            let currentPair = currentMatchups[currentMatchIndex];
            document.getElementById('nameA').innerText = currentPair[0];
            document.getElementById('nameB').innerText = currentPair[1];
        }

        function castVote(selectedIndex) {
            let currentPair = currentMatchups[currentMatchIndex];
            let winner = currentPair[selectedIndex];
            let loser = currentPair[selectedIndex === 0 ? 1 : 0];

            nextRoundPool.push(winner);
            logEvent("❌ " + loser + " eliminated by " + winner);

            currentMatchIndex++;

            if (currentMatchIndex < currentMatchups.length) {
                // Next match in current round
                updateUI();
            } else {
                // Current round finished
                activePool = [...nextRoundPool];
                
                if (activePool.length === 1) {
                    // We have an ultimate champion
                    showWinner(activePool[0]);
                } else {
                    // Move to next round
                    roundNumber++;
                    logEvent(" Going into Round " + roundNumber + " with " + activePool.length + " contenders.");
                    generateRoundMatchups();
                }
            }
        }

        function showWinner(winnerName) {
            document.getElementById('tournament-view').style.display = 'none';
            document.getElementById('winner-view').style.display = 'block';
            document.getElementById('winner-name').innerText = winnerName;
            logEvent("🏆 TOURNAMENT CHAMPION: " + winnerName);
        }

        function resetTournament() {
            initTournament();
        }

        // Boot system up
        initTournament();
    </script>
</body>
</html>
